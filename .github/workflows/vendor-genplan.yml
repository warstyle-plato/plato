name: Vendor Genplan calculator assets

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/vendor-genplan.yml"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "genplan-vendor-trigger.txt"

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Download pinned public calculator assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p genplan_assets
          base="https://genplan.tech/calc/assets"
          assets=(
            "index-B0jIwkVO.js"
            "rolldown-runtime-QTnfLwEv.js"
            "@map-C8A16ZpL.js"
            "@mui-Dy0laxMi.js"
            "@react-D7li0Nm9.js"
            "@mui-icons-BAApue2C.js"
            "@export-Dq7e_Rpm.js"
            "area-panel-D5vuUEJ8.js"
            "calc-BTtvF0Z6.js"
            "domain-CwUeX6RP.js"
            "@mui-charts-MKNt4QlC.js"
            "analysis-panel-Bp17MNRz.js"
            "map-page-CqxMR2K5.js"
            "@map-B2k4QVOw.css"
            "index-B8zlAO9I.css"
          )
          download_asset() {
            local asset="$1"
            curl --fail --location --retry 3 --connect-timeout 20 --max-time 180 \
              --user-agent "Mozilla/5.0" \
              --referer "https://genplan.tech/calc/" \
              --output "genplan_assets/${asset}" "${base}/${asset}"
            test -s "genplan_assets/${asset}"
          }
          for asset in "${assets[@]}"; do
            download_asset "${asset}"
          done
          for pass in 1 2 3 4; do
            changed=0
            while IFS= read -r asset; do
              test -n "${asset}" || continue
              if test ! -s "genplan_assets/${asset}"; then
                download_asset "${asset}"
                changed=1
              fi
            done < <(grep -hEo '[A-Za-z0-9@_.-]+-[A-Za-z0-9_-]+\.(js|css|woff2)' genplan_assets/*.js genplan_assets/*.css | sort -u)
            test "${changed}" -eq 1 || break
          done
      - name: Commit refreshed assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add genplan_assets
          if git diff --cached --quiet; then
            echo "Assets are already current"
            exit 0
          fi
          git commit -m "Vendor pinned Genplan calculator assets"
          git push
