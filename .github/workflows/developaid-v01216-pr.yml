name: Run DevelopAid v0.12.16 patch on PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: developaid-v01216-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply release patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          set +e
          (
            echo "STANDALONE_PATCH_VALIDATION"
            python .github/patch_developaid_v01216.py
            patch_rc=$?
            if [ "$patch_rc" -eq 0 ]; then
              python -m py_compile main.py
              compile_rc=$?
            else
              compile_rc=0
            fi
            exit_code=$(( patch_rc != 0 ? patch_rc : compile_rc ))
            echo "EXIT_CODE=$exit_code"
            exit "$exit_code"
          ) > /tmp/developaid-patch.log 2>&1
          rc=$?
          set -e

          if [ "$rc" -ne 0 ]; then
            cp /tmp/developaid-patch.log .github/developaid-v01216-error.txt
            git add .github/developaid-v01216-error.txt
            git commit -m "Capture DevelopAid v0.12.16 patch error" || true
            git push origin HEAD:${{ github.head_ref }} || true
            cat /tmp/developaid-patch.log
            exit "$rc"
          fi

          rm -f .github/developaid-v01216-error.txt
          git add -A main.py .github/developaid-v01216-error.txt
          git commit -m "Add housing class economics flow to DevelopAid bot"
          git push origin HEAD:${{ github.head_ref }}
