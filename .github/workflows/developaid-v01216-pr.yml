name: Run DevelopAid v0.12.16 patch on PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply release patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          set +e
          python .github/patch_developaid_v01216.py > /tmp/developaid-patch.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            cp /tmp/developaid-patch.log .github/developaid-v01216-error.txt
            git add .github/developaid-v01216-error.txt
            git commit -m "Capture DevelopAid v0.12.16 patch error" || true
            git push origin HEAD:${{ github.head_ref }} || true
            cat /tmp/developaid-patch.log
            exit "$rc"
          fi

          python -m py_compile main.py
          rm -f .github/developaid-v01216-error.txt
          git add -A main.py .github/developaid-v01216-error.txt
          git commit -m "Add housing class economics flow to DevelopAid bot"
          git push origin HEAD:${{ github.head_ref }}
