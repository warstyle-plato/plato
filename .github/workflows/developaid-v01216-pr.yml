name: Run DevelopAid v0.12.16 patch on PR

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and run release patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/developaid-v01216.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          script = textwrap.dedent('\n'.join(source[start:end])) + '\n'
          Path('/tmp/developaid_patch.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/developaid_patch.py
          python -m py_compile main.py

      - name: Commit patched bot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py
          git commit -m "Add housing class economics flow to DevelopAid bot"
          git push origin HEAD:${{ github.head_ref }}
