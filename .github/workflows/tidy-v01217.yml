name: Tidy DevelopAid v0.12.17 flow

on:
  push:
    branches:
      - agent/developaid-v01217-product-flow
    paths:
      - .github/workflows/tidy-v01217.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/developaid-v01217-product-flow
          fetch-depth: 0

      - name: Apply tidy patch
        run: python scripts/tidy_v01217.py

      - name: Validate syntax without bytecode
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path
          text = Path('main.py').read_text(encoding='utf-8')
          ast.parse(text)
          assert 'DevelopAid запросит отдельным следующим шагом' in text
          assert 'while idx < len(specs) and data.get(specs[idx][0]) not in (None, "")' in text
          PY

      - name: Commit tidy result
        run: |
          rm -f scripts/tidy_v01217.py .github/workflows/tidy-v01217.yml
          git config user.name "DevelopAid Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Polish DevelopAid v0.12.17 product economics flow"
          git push origin HEAD:agent/developaid-v01217-product-flow
