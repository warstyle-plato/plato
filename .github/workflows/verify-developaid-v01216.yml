name: Verify DevelopAid v0.12.16 deployment

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployed Telegram service
        shell: bash
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          url = 'https://plato-development-investment-model.onrender.com/telegram/status'
          last = ''
          for attempt in range(36):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'DevelopAid-deploy-verifier/1.0'})
                  with urllib.request.urlopen(req, timeout=25) as r:
                      body = r.read().decode('utf-8', 'replace')
                  last = body
                  print(f'Attempt {attempt+1}: {body}', flush=True)
                  data = json.loads(body)
                  if data.get('version') == '0.12.16' and data.get('enabled') and data.get('configured'):
                      print('DEPLOY_VERIFIED version=0.12.16 enabled=true configured=true', flush=True)
                      raise SystemExit(0)
              except Exception as exc:
                  last = repr(exc)
                  print(f'Attempt {attempt+1} error: {exc!r}', flush=True)
              time.sleep(10)
          raise SystemExit('Deployment not verified. Last response: ' + last)
          PY
